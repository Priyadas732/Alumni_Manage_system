services:
  - type: web
    name: alumni-manage-backend
    runtime: node
    region: oregon
    plan: free
    # No rootDir — build from repo root so npm workspaces resolves correctly
    buildCommand: npm run render-build
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        sync: false
